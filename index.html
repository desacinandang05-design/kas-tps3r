<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TPS3R Setia Karya</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
</head>
<body>
body {
  font-family: 'Segoe UI', Arial;
  background: #eef2f7;
  margin: 0;
}
.dashboard {
  display: flex;
  justify-content: center;   /* tengah horizontal */
  align-items: center;       /* tengah vertikal */
  gap: 20px;
  flex-wrap: wrap;
  margin: 30px 0;
}
.box {
  width: 220px;
  height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  border-radius: 12px;
}
.box h3 {
  margin: 0;
  font-size: 16px;
}

.box p {
  font-size: 20px;
  font-weight: bold;
  margin-top: 5px;
}

.saldo {
  background: linear-gradient(135deg, #3182ce, #63b3ed);
}

.masuk {
  background: linear-gradient(135deg, #38a169, #68d391);
}

.keluar {
  background: linear-gradient(135deg, #e53e3e, #fc8181);
}
th:nth-child(1), td:nth-child(1) { width: 3%; }   /* No */
th:nth-child(2), td:nth-child(2) { width: 10%; }  /* Tanggal */
th:nth-child(3), td:nth-child(3) { width: 15%; text-align: left; } /* Uraian */
th:nth-child(4), td:nth-child(4) { width: 10%; }  /* Masuk */
th:nth-child(5), td:nth-child(5) { width: 10%; }  /* Keluar */
th:nth-child(6), td:nth-child(6) { width: 10%; }  /* Saldo */
th:nth-child(7), td:nth-child(7) { width: 5%; }  /* Aksi */

th, td {
  padding: 12px 10px;
  border: 1px solid #999;   /* garis lebih jelas */
}

td:nth-child(4),
td:nth-child(5),
td:nth-child(6) {
  text-align: right;
  padding-right: 15px;
}

table {
  width: 75%;
  margin: 20px auto;   /* biar di tengah */
  border-collapse: collapse;
  table-layout: fixed;
}

td:nth-child(3) {
  padding-left: 10px;
}

table {
  border: 2px solid #555;
}

th {
  background: #2c7a7b;
  color: white;
  border: 1px solid #555;
}

tr:nth-child(even) {
  background: #f2f2f2;
}

button {
  min-width: 120px;
}

td:last-child {
  text-align: center;
}

td:last-child button {
  min-width: auto;     /* hilangkan lebar default */
  padding: 5px 8px;
  font-size: 12px;
  margin: 2px;
}
.aksi-btn {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.aksi-btn button {
  padding: 5px 8px;
  font-size: 12px;
  min-width: auto;
}

th:last-child, td:last-child {
  text-align: center;
  width: 120px;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  width: 300px;
  margin: 10% auto;
  border-radius: 10px;
  text-align: center;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  width: 300px;
  margin: 10% auto;
  border-radius: 10px;
  text-align: center;
}

.aksi-btn button {
  background: #2c7a7b;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.aksi-btn button:hover {
  opacity: 0.8;
}

.modal-content {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {transform: scale(0.8); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

@media (max-width: 768px) {

  .container {
    padding: 10px;
  }

  /* Dashboard jadi ke bawah */
  .dashboard {
    flex-direction: column;
    align-items: center;
  }

  .box {
    width: 90%;
    height: auto;
    padding: 15px;
  }

  /* Form input full lebar */
  input {
    width: 95%;
    margin: 5px auto;
    display: block;
  }

  button {
    width: 95%;
    margin: 5px auto;
    display: block;
  }

  /* Tabel scroll horizontal */
  table {
    width: 100%;
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  /* Kolom tidak terlalu kecil */
  th, td {
    font-size: 12px;
    padding: 8px;
  }

  /* Tombol aksi tetap rapi */
  .aksi-btn {
    flex-direction: row;
    gap: 3px;
  }

}

.header {
  font-size: 18px;
  padding: 15px;
}

button:active {
  transform: scale(0.97);
}

</style>

<div class="header">
  TPS3R Setia Karya Desa Cinandang
</div>

<div class="container">
</div>
  
<h2>TPS3R Setia Karya - Pembukuan</h2>

<div id="login">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login / Daftar</button>
</div>

<div id="app" style="display:none;">
<div id="modalEdit" class="modal">
  <div class="modal-content">
    <h3>Edit Data</h3>

    <input type="date" id="editTanggal">
    <input type="text" id="editUraian" placeholder="Uraian">
    <input type="text" id="editMasuk" placeholder="Masuk">
    <input type="text" id="editKeluar" placeholder="Keluar">

    <br><br>
    <button onclick="simpanEdit()">Simpan</button>
    <button onclick="tutupModal()">Batal</button>
  </div>
</div>
<div class="dashboard">
  <div class="card box saldo">
    <h3>Saldo</h3>
    <p id="saldoDashboard">Rp 0</p>
  </div>
  <div class="card box masuk">
    <h3>Total Masuk</h3>
    <p id="masukDashboard">Rp 0</p>
  </div>
  <div class="card box keluar">
    <h3>Total Keluar</h3>
    <p id="keluarDashboard">Rp 0</p>
  </div>
</div>
<button onclick="logout()">Logout</button><br>

<input type="date" id="tanggal">
<input type="text" id="uraian" placeholder="Uraian">
<input type="text" id="masuk" placeholder="Masuk">
<input type="text" id="keluar" placeholder="Keluar">
<button id="btnSimpan" onclick="tambah()">Tambah</button>
<button onclick="exportExcel()">Export Excel</button>
<h3>Laporan Bulanan</h3>

<input type="month" id="bulan">
<button onclick="laporan()">Tampilkan</button>

<br>

<button onclick="semuaBulan()">Semua Bulan</button>
<button onclick="bulanIni()">Bulan Ini</button>

<p id="hasil"></p>
<table>
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Uraian</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Saldo</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>

function laporan(){
  let bulan = document.getElementById("bulan").value;

  let totalMasuk = 0;
  let totalKeluar = 0;

  data.forEach(d => {
    if(d.tanggal.startsWith(bulan)){
      totalMasuk += d.masuk;
      totalKeluar += d.keluar;
    }
  });

  let saldo = totalMasuk - totalKeluar;

document.getElementById("hasil").innerHTML = `
  Total Masuk: Rp ${formatRupiah(totalMasuk)} <br>
  Total Keluar: Rp ${formatRupiah(totalKeluar)} <br>
  Saldo: Rp ${formatRupiah(saldo)}
`;
}
// 🔥 CONFIG PUNYA MAS
const firebaseConfig = {
  apiKey: "AIzaSyC97EDb5XcD_pYt2UZp94ILTUjM8Mqkq_s",
  authDomain: "tps3r-setia-karya.firebaseapp.com",
  projectId: "tps3r-setia-karya",
  storageBucket: "tps3r-setia-karya.firebasestorage.app",
  messagingSenderId: "278273096208",
  appId: "1:278273096208:web:d7b227e3bf0d94e5faa895"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let data = [];

// LOGIN / REGISTER
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    alert("Login berhasil");
  })
  .catch(err => {
    // kalau belum punya akun → otomatis daftar
    auth.createUserWithEmailAndPassword(email, password)
    .then(()=>{
      alert("Akun dibuat & login berhasil");
    })
    .catch(e => alert(e.message));
  });
}
// LOGOUT
function logout(){
  auth.signOut();
}

// CEK LOGIN
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    ambilData();
  } else {
    document.getElementById("login").style.display="block";
    document.getElementById("app").style.display="none";
  }
});
// TAMBAH DATA
function tambah(){
  db.collection("kas").add({
    tanggal: document.getElementById("tanggal").value,
    uraian: document.getElementById("uraian").value,
    masuk: parseInt(document.getElementById("masuk").value.replace(/\./g, "")) || 0,
    keluar: parseInt(document.getElementById("keluar").value.replace(/\./g, "")) || 0
  });
}

// AMBIL DATA REALTIME
function ambilData(){
  db.collection("kas").orderBy("tanggal")
  .onSnapshot(snapshot=>{
    data=[];
    snapshot.forEach(doc=>{
      data.push({id:doc.id, ...doc.data()});
    });
    tampil();
  });
}

// TAMPILKAN
function tampil(){
  let t = "";
  let saldo = 0;
  let totalMasuk = 0;
  let totalKeluar = 0;

  let bulan = document.getElementById("bulan").value;
  let no = 1;

  data.forEach((d)=>{

    if (bulan && !d.tanggal.startsWith(bulan)) return;

    saldo += (d.masuk - d.keluar);
    totalMasuk += d.masuk;
    totalKeluar += d.keluar;

    t+=`
    <tr>
    <td>${no++}</td>
    <td>${d.tanggal}</td>
    <td>${d.uraian}</td>
    <td>${d.masuk ? formatRupiah(d.masuk) : "-"}</td>
    <td>${d.keluar ? formatRupiah(d.keluar) : "-"}</td>
    <td>${formatRupiah(saldo)}</td>
    <td>
      <div class="aksi-btn">
        <button onclick="editData('${d.id}', '${d.tanggal}', '${d.uraian}', ${d.masuk}, ${d.keluar})">
          <i class="fa fa-edit"></i>
        </button>
        <button onclick="hapus('${d.id}')">
          <i class="fa fa-trash"></i>
        </button>
      </div>
    </td>
    </tr>`;
  });

  document.getElementById("tabel").innerHTML = t;

  document.getElementById("saldoDashboard").innerText = "Rp " + formatRupiah(saldo);
  document.getElementById("masukDashboard").innerText = "Rp " + formatRupiah(totalMasuk);
  document.getElementById("keluarDashboard").innerText = "Rp " + formatRupiah(totalKeluar);
}
// HAPUS
function hapus(id){
  if(confirm("Yakin mau hapus data ini?")){
    db.collection("kas").doc(id).delete();
  }
}
function exportExcel() {

    if (data.length === 0) {
        alert("Data masih kosong!");
        return;
    }

    let saldo = 0;
    let totalMasuk = 0;
    let totalKeluar = 0;

    let bulan = document.getElementById("bulan").value;

    const wsData = [
        ["LAPORAN KAS TPS3R SETIA KARYA"],
        ["DESA CINANDANG"],
        [bulan ? "Periode: " + bulan : ""],
        [],
        ["No", "Tanggal", "Uraian", "Masuk", "Keluar", "Saldo"]
    ];

    let no = 1;

    data.forEach((d) => {

        if (bulan && !d.tanggal.startsWith(bulan)) return;

        saldo += (d.masuk - d.keluar);
        totalMasuk += d.masuk;
        totalKeluar += d.keluar;

        wsData.push([
            no++,
            d.tanggal,
            d.uraian,
            d.masuk ? "Rp " + d.masuk.toLocaleString("id-ID") : "-",
            d.keluar ? "Rp " + d.keluar.toLocaleString("id-ID") : "-",
            "Rp " + saldo.toLocaleString("id-ID")
        ]);
    });

    // JARAK
    wsData.push([]);

    // TOTAL
    wsData.push(["", "", "TOTAL MASUK", "Rp " + totalMasuk.toLocaleString("id-ID")]);
    wsData.push(["", "", "TOTAL KELUAR", "Rp " + totalKeluar.toLocaleString("id-ID")]);
    wsData.push(["", "", "SALDO AKHIR", "Rp " + saldo.toLocaleString("id-ID")]);

    // TANDA TANGAN
    wsData.push([]);
    wsData.push([]);
    wsData.push(["", "", "", "Mengetahui,"]);
    wsData.push(["", "", "", "Ketua TPS3R"]);
    wsData.push([]);
    wsData.push([]);
    wsData.push(["", "", "", "(____________________)"]);

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // LEBAR KOLOM
    ws['!cols'] = [
        { wch: 5 },
        { wch: 15 },
        { wch: 40 },
        { wch: 20 },
        { wch: 20 },
        { wch: 20 }
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Laporan Kas");

    XLSX.writeFile(wb, "Laporan_Kas_TPS3R.xlsx");
}

function formatRupiah(angka) {
    return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

document.getElementById("masuk").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");
    e.target.value = formatRupiah(value);
});

document.getElementById("keluar").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");
    e.target.value = formatRupiah(value);
});

document.getElementById("bulan").addEventListener("change", tampil);

function semuaBulan(){
    document.getElementById("bulan").value = "";
    tampil();
}

function bulanIni(){
    let sekarang = new Date();
    let bulan = sekarang.toISOString().slice(0,7); // format YYYY-MM

    document.getElementById("bulan").value = bulan;
    tampil();
}

window.onload = function() {
    bulanIni();
};

function editData(id, tanggal, uraian, masuk, keluar){

    document.getElementById("tanggal").value = tanggal;
    document.getElementById("uraian").value = uraian;
    document.getElementById("masuk").value = formatRupiah(masuk);
    document.getElementById("keluar").value = formatRupiah(keluar);

    const btn = document.getElementById("btnSimpan");
    btn.innerText = "Update";
    btn.setAttribute("onclick", `updateData('${id}')`);
}

function updateData(id){
    db.collection("kas").doc(id).update({
        tanggal: document.getElementById("tanggal").value,
        uraian: document.getElementById("uraian").value,
        masuk: parseInt(document.getElementById("masuk").value.replace(/\./g, "")) || 0,
        keluar: parseInt(document.getElementById("keluar").value.replace(/\./g, "")) || 0
    });

    // reset form
    document.getElementById("tanggal").value = "";
    document.getElementById("uraian").value = "";
    document.getElementById("masuk").value = "";
    document.getElementById("keluar").value = "";

    const btn = document.getElementById("btnSimpan");
    btn.innerText = "Tambah";
    btn.setAttribute("onclick", "tambah()");
}

let editId = null;

function editData(id, tanggal, uraian, masuk, keluar){
    editId = id;

    document.getElementById("editTanggal").value = tanggal;
    document.getElementById("editUraian").value = uraian;
    document.getElementById("editMasuk").value = formatRupiah(masuk);
    document.getElementById("editKeluar").value = formatRupiah(keluar);

    document.getElementById("modalEdit").style.display = "block";
}

function tutupModal(){
    document.getElementById("modalEdit").style.display = "none";
}

function simpanEdit(){
    db.collection("kas").doc(editId).update({
        tanggal: document.getElementById("editTanggal").value,
        uraian: document.getElementById("editUraian").value,
        masuk: parseInt(document.getElementById("editMasuk").value.replace(/\./g, "")) || 0,
        keluar: parseInt(document.getElementById("editKeluar").value.replace(/\./g, "")) || 0
    });

    tutupModal();
}

</script>

</body>
</html>
