<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TPS3R Setia Karya</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; margin: 20px; }
input, button { margin: 5px; padding: 6px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
</style>
</head>

<body>

<h2>TPS3R Setia Karya - Pembukuan</h2>

<div id="login">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login / Daftar</button>
</div>

<div id="app" style="display:none;">
<button onclick="logout()">Logout</button><br>

<input type="date" id="tanggal">
<input type="text" id="uraian" placeholder="Uraian">
<input type="number" id="masuk" placeholder="Masuk">
<input type="number" id="keluar" placeholder="Keluar">
<button onclick="tambah()">Tambah</button>
<h3>Laporan Bulanan</h3>

<input type="month" id="bulan">
<button onclick="laporan()">Tampilkan</button>

<p id="hasil"></p>
<table>
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Uraian</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Saldo</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>

function laporan(){
  let bulan = document.getElementById("bulan").value;

  let totalMasuk = 0;
  let totalKeluar = 0;

  data.forEach(d => {
    if(d.tanggal.startsWith(bulan)){
      totalMasuk += d.masuk;
      totalKeluar += d.keluar;
    }
  });

  let saldo = totalMasuk - totalKeluar;

  document.getElementById("hasil").innerHTML = `
    Total Masuk: ${totalMasuk} <br>
    Total Keluar: ${totalKeluar} <br>
    Saldo: ${saldo}
  `;
}
// 🔥 CONFIG PUNYA MAS
const firebaseConfig = {
  apiKey: "AIzaSyC97EDb5XcD_pYt2UZp94ILTUjM8Mqkq_s",
  authDomain: "tps3r-setia-karya.firebaseapp.com",
  projectId: "tps3r-setia-karya",
  storageBucket: "tps3r-setia-karya.firebasestorage.app",
  messagingSenderId: "278273096208",
  appId: "1:278273096208:web:d7b227e3bf0d94e5faa895"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let data = [];

// LOGIN / REGISTER
function login(){
  let emailVal = document.getElementById("email").value;
  let passVal = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(emailVal, passVal)
  .then(()=> alert("Login berhasil"))
  .catch(err => {
    alert(err.message);
    auth.createUserWithEmailAndPassword(emailVal, passVal)
    .catch(e => alert(e.message));
  });
}

// LOGOUT
function logout(){
  auth.signOut();
}

// CEK LOGIN
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    ambilData();
  }
});

// TAMBAH DATA
function tambah(){
  db.collection("kas").add({
    tanggal: document.getElementById("tanggal").value,
    uraian: document.getElementById("uraian").value,
    masuk: parseInt(document.getElementById("masuk").value)||0,
    keluar: parseInt(document.getElementById("keluar").value)||0
  });
}

// AMBIL DATA REALTIME
function ambilData(){
  db.collection("kas").orderBy("tanggal")
  .onSnapshot(snapshot=>{
    data=[];
    snapshot.forEach(doc=>{
      data.push({id:doc.id, ...doc.data()});
    });
    tampil();
  });
}

// TAMPILKAN
function tampil(){
  let t="";
  let saldo=0;

  data.forEach((d,i)=>{
    saldo += (d.masuk - d.keluar);
    t+=`
    <tr>
    <td>${i+1}</td>
    <td>${d.tanggal}</td>
    <td>${d.uraian}</td>
    <td>${d.masuk}</td>
    <td>${d.keluar}</td>
    <td>${saldo}</td>
    <td><button onclick="hapus('${d.id}')">Hapus</button></td>
    </tr>`;
  });

  document.getElementById("tabel").innerHTML=t;
}

// HAPUS
function hapus(id){
  db.collection("kas").doc(id).delete();
}

</script>

</body>
</html>
