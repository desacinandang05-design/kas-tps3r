<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TPS3R Setia Karya</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
</head>
body {
  font-family: 'Segoe UI', Arial;
  background: #eef2f7;
  margin: 0;
}

.dashboard {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.box {
  flex: 1;
  min-width: 200px;
  text-align: center;
  color: white;
  border-radius: 12px;
}

.box h3 {
  margin: 0;
  font-size: 16px;
}

.box p {
  font-size: 20px;
  font-weight: bold;
  margin-top: 5px;
}

.saldo {
  background: linear-gradient(135deg, #3182ce, #63b3ed);
}

.masuk {
  background: linear-gradient(135deg, #38a169, #68d391);
}

.keluar {
  background: linear-gradient(135deg, #e53e3e, #fc8181);
}
.header {
  background: linear-gradient(135deg, #2c7a7b, #38b2ac);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

input {
  width: 180px;
}

button {
  background: #2c7a7b;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #285e61;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #2c7a7b;
  color: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

tr:nth-child(even) {
  background: #f9f9f9;
}
</style>
</style>

<div class="header">
  TPS3R Setia Karya Desa Cinandang
</div>

<div class="container">
</div>
  
<h2>TPS3R Setia Karya - Pembukuan</h2>

<div id="login">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login / Daftar</button>
</div>

<div id="app" style="display:none;">
<div class="dashboard">
  <div class="card box saldo">
    <h3>Saldo</h3>
    <p id="saldoDashboard">Rp 0</p>
  </div>
  <div class="card box masuk">
    <h3>Total Masuk</h3>
    <p id="masukDashboard">Rp 0</p>
  </div>
  <div class="card box keluar">
    <h3>Total Keluar</h3>
    <p id="keluarDashboard">Rp 0</p>
  </div>
</div>
<button onclick="logout()">Logout</button><br>

<input type="date" id="tanggal">
<input type="text" id="uraian" placeholder="Uraian">
<input type="number" id="masuk" placeholder="Masuk">
<input type="number" id="keluar" placeholder="Keluar">
<button onclick="tambah()">Tambah</button>
<button onclick="exportExcel()">Export Excel</button>
<h3>Laporan Bulanan</h3>

<input type="month" id="bulan">
<button onclick="laporan()">Tampilkan</button>

<p id="hasil"></p>
<table>
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Uraian</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Saldo</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>

function laporan(){
  let bulan = document.getElementById("bulan").value;

  let totalMasuk = 0;
  let totalKeluar = 0;

  data.forEach(d => {
    if(d.tanggal.startsWith(bulan)){
      totalMasuk += d.masuk;
      totalKeluar += d.keluar;
    }
  });

  let saldo = totalMasuk - totalKeluar;

  document.getElementById("hasil").innerHTML = `
    Total Masuk: ${totalMasuk} <br>
    Total Keluar: ${totalKeluar} <br>
    Saldo: ${saldo}
  `;
}
// 🔥 CONFIG PUNYA MAS
const firebaseConfig = {
  apiKey: "AIzaSyC97EDb5XcD_pYt2UZp94ILTUjM8Mqkq_s",
  authDomain: "tps3r-setia-karya.firebaseapp.com",
  projectId: "tps3r-setia-karya",
  storageBucket: "tps3r-setia-karya.firebasestorage.app",
  messagingSenderId: "278273096208",
  appId: "1:278273096208:web:d7b227e3bf0d94e5faa895"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let data = [];

// LOGIN / REGISTER
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    alert("Login berhasil");
  })
  .catch(err => {
    // kalau belum punya akun → otomatis daftar
    auth.createUserWithEmailAndPassword(email, password)
    .then(()=>{
      alert("Akun dibuat & login berhasil");
    })
    .catch(e => alert(e.message));
  });
}
// LOGOUT
function logout(){
  auth.signOut();
}

// CEK LOGIN
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    ambilData();
  } else {
    document.getElementById("login").style.display="block";
    document.getElementById("app").style.display="none";
  }
});
// TAMBAH DATA
function tambah(){
  db.collection("kas").add({
    tanggal: document.getElementById("tanggal").value,
    uraian: document.getElementById("uraian").value,
    masuk: parseInt(document.getElementById("masuk").value.replace(/\./g, "")) || 0,
    keluar: parseInt(document.getElementById("keluar").value.replace(/\./g, "")) || 0
  });
}

// AMBIL DATA REALTIME
function ambilData(){
  db.collection("kas").orderBy("tanggal")
  .onSnapshot(snapshot=>{
    data=[];
    snapshot.forEach(doc=>{
      data.push({id:doc.id, ...doc.data()});
    });
    tampil();
  });
}

// TAMPILKAN
function tampil(){
  let totalMasuk = 0;
  let totalKeluar = 0;

  data.forEach((d,i)=>{
    saldo += (d.masuk - d.keluar);
    totalMasuk += d.masuk;
    totalKeluar += d.keluar;
    t+=`
    <tr>
    <td>${i+1}</td>
    <td>${d.tanggal}</td>
    <td>${d.uraian}</td>
    <td>${d.masuk ? formatRupiah(d.masuk) : "-"}</td>
    <td>${d.keluar ? formatRupiah(d.keluar) : "-"}</td>
    <td>${formatRupiah(saldo)}</td>
    <td><button onclick="hapus('${d.id}')">Hapus</button></td>
    </tr>`;
  });

  document.getElementById("tabel").innerHTML=t;
}

document.getElementById("saldoDashboard").innerText = "Rp " + formatRupiah(saldo);
document.getElementById("masukDashboard").innerText = "Rp " + formatRupiah(totalMasuk);
document.getElementById("keluarDashboard").innerText = "Rp " + formatRupiah(totalKeluar);

// HAPUS
function hapus(id){
  db.collection("kas").doc(id).delete();
}
function exportExcel() {

    if (data.length === 0) {
        alert("Data masih kosong!");
        return;
    }

    let saldo = 0;
    let totalMasuk = 0;
    let totalKeluar = 0;

    let bulan = document.getElementById("bulan").value;

    const wsData = [
        ["LAPORAN KAS TPS3R SETIA KARYA"],
        ["DESA CINANDANG"],
        [bulan ? "Periode: " + bulan : ""],
        [],
        ["No", "Tanggal", "Uraian", "Masuk", "Keluar", "Saldo"]
    ];

    let no = 1;

    data.forEach((d) => {

        if (bulan && !d.tanggal.startsWith(bulan)) return;

        saldo += (d.masuk - d.keluar);
        totalMasuk += d.masuk;
        totalKeluar += d.keluar;

        wsData.push([
            no++,
            d.tanggal,
            d.uraian,
            d.masuk ? "Rp " + d.masuk.toLocaleString("id-ID") : "-",
            d.keluar ? "Rp " + d.keluar.toLocaleString("id-ID") : "-",
            "Rp " + saldo.toLocaleString("id-ID")
        ]);
    });

    // JARAK
    wsData.push([]);

    // TOTAL
    wsData.push(["", "", "TOTAL MASUK", "Rp " + totalMasuk.toLocaleString("id-ID")]);
    wsData.push(["", "", "TOTAL KELUAR", "Rp " + totalKeluar.toLocaleString("id-ID")]);
    wsData.push(["", "", "SALDO AKHIR", "Rp " + saldo.toLocaleString("id-ID")]);

    // TANDA TANGAN
    wsData.push([]);
    wsData.push([]);
    wsData.push(["", "", "", "Mengetahui,"]);
    wsData.push(["", "", "", "Ketua TPS3R"]);
    wsData.push([]);
    wsData.push([]);
    wsData.push(["", "", "", "(____________________)"]);

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // LEBAR KOLOM
    ws['!cols'] = [
        { wch: 5 },
        { wch: 15 },
        { wch: 40 },
        { wch: 20 },
        { wch: 20 },
        { wch: 20 }
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Laporan Kas");

    XLSX.writeFile(wb, "Laporan_Kas_TPS3R.xlsx");
}

function formatRupiah(angka) {
    return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

document.getElementById("masuk").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");
    e.target.value = formatRupiah(value);
});

document.getElementById("keluar").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");
    e.target.value = formatRupiah(value);
});

</script>

</body>
</html>
